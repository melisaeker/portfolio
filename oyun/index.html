<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity Web Player | CandyCrushSaga</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
      }

      #unity-canvas {
        display: block;
        background: black;

        /* Oyunun sabit oranı: 828x1792 */
        aspect-ratio: 828 / 1792;

        /* Ekranı olabildiğince doldurur ama oranı bozmaz */
        width: min(100vw, calc(100vh * 828 / 1792));
        height: min(100vh, calc(100vw * 1792 / 828));
      }

      #unity-loading-bar {
        position: absolute;
      }

      #unity-warning {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 10;
      }

      #unity-footer {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 5;
      }

      /* İstersen footer hep görünsün diye bırak */
      /* Tam temiz görüntü istersen bunu display:none yapabilirsin */
      #unity-logo-title-footer,
      #unity-build-title {
        color: white;
      }

      /* Mobil tarayıcılarda adres çubuğu yüzünden küçük oynamalar olabilir */
      @supports (height: 100dvh) {
        #unity-canvas {
          width: min(100vw, calc(100dvh * 828 / 1792));
          height: min(100dvh, calc(100vw * 1792 / 828));
        }
      }
    </style>
  </head>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="828" height="1792" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">CandyCrushSaga</div>
      </div>
    </div>

    <script>
      const canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        const warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        const div = document.createElement("div");
        div.innerHTML = msg;
        div.style.padding = "10px";
        div.style.marginBottom = "8px";

        if (type === "error") {
          div.style.background = "red";
          div.style.color = "white";
        } else if (type === "warning") {
          div.style.background = "yellow";
          div.style.color = "black";
        }

        warningBanner.appendChild(div);

        if (type !== "error") {
          setTimeout(() => {
            if (div.parentNode === warningBanner) {
              warningBanner.removeChild(div);
            }
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/CandyCrushCV.loader.js";

      const config = {
        arguments: [],
        dataUrl: buildUrl + "/CandyCrushCV.data",
        frameworkUrl: buildUrl + "/CandyCrushCV.framework.js",
        codeUrl: buildUrl + "/CandyCrushCV.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CandyCrushSaga",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Mobilde performans gerekirse açabilirsin:
      // if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      //   config.devicePixelRatio = 1;
      // }

      document.querySelector("#unity-loading-bar").style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
        })
        .then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        })
        .catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
