<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity Web Player | CandyCrushSaga</title>

    <style>
      #unity-loading-bar {
        position: absolute;
        z-index: 10;
        text-align: center;
        color: white;
        font-family: Arial, sans-serif;
      }

      #unity-loading-text {
        margin-bottom: 10px;
        font-size: 18px;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
      }

      #unity-canvas {
        display: block;
        background: black;

        aspect-ratio: 828 / 1792;

        width: min(100vw, calc(100vh * 828 / 1792));
        height: min(100vh, calc(100vw * 1792 / 828));
      }

      

      #unity-warning {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 20;
      }

      /* Unity'nin tüm gereksiz UI'larını kapat */
      #unity-footer,
      #unity-logo,
      #unity-logo-title-footer,
      #unity-fullscreen-button {
        display: none !important;
      }

      @supports (height: 100dvh) {
        #unity-canvas {
          width: min(100vw, calc(100dvh * 828 / 1792));
          height: min(100dvh, calc(100vw * 1792 / 828));
        }
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="828" height="1792"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-loading-text">Loading...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>
    </div>

    <script>
  const canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    const warningBanner = document.querySelector("#unity-warning");

    const div = document.createElement("div");
    div.innerHTML = msg;
    div.style.padding = "10px";
    div.style.marginBottom = "8px";

    if (type === "error") {
      div.style.background = "red";
      div.style.color = "white";
    } else {
      div.style.background = "yellow";
      div.style.color = "black";
    }

    warningBanner.appendChild(div);

    setTimeout(() => {
      if (div.parentNode === warningBanner) {
        warningBanner.removeChild(div);
      }
    }, 5000);
  }

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/CandyCrushCV.loader.js";

  const config = {
    dataUrl: buildUrl + "/CandyCrushCV.data",
    frameworkUrl: buildUrl + "/CandyCrushCV.framework.js",
    codeUrl: buildUrl + "/CandyCrushCV.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "CandyCrushSaga",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  document.querySelector("#unity-loading-bar").style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
      document.querySelector("#unity-loading-text").innerText =
        "Loading " + Math.floor(progress * 100) + "%";
    })
    .then(() => {
      document.querySelector("#unity-loading-bar").style.display = "none";
    })
    .catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);
</script>
  </body>
</html>
